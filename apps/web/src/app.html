<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6C42FF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Primary SEO -->
    <title>Genie — Assistente Financeiro com IA para B3</title>
    <meta name="description" content="Genie é um assistente financeiro conversacional com IA. Consulte cotações, fundamentos, notícias e rankings de ativos da B3 em tempo real." />
    <meta name="keywords" content="B3, bolsa de valores, ações, cotações, fundamentos, dividendos, FIIs, ETFs, assistente financeiro, IA, inteligência artificial" />
    <meta name="author" content="Genie" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Genie" />
    <meta property="og:title" content="Genie — Assistente Financeiro com IA para B3" />
    <meta property="og:description" content="Consulte cotações, fundamentos, notícias e rankings de ativos da B3 com um assistente conversacional com IA." />
    <meta property="og:image" content="%sveltekit.assets%/favicon.png" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Genie — Assistente Financeiro com IA para B3" />
    <meta name="twitter:description" content="Consulte cotações, fundamentos, notícias e rankings de ativos da B3 com IA." />
    <meta name="twitter:image" content="%sveltekit.assets%/favicon.png" />

    <!-- Orb Quantum typography: Sora (display) + Inter (body) + Space Grotesk (technical) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="tap">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
